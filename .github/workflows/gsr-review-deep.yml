name: GSR Deep Review (Agent Swarm)

# Full GSR agent-swarm review (Architecture, Logic, Security, TechDebt,
# Testing agents + dedup pass) -- slower/pricier than the basic-mode review
# in gsr-review.yml that runs on every PR, so this one is opt-in only:
# apply the "deep-review" label to a PR, or run it manually from the
# Actions tab. Mirrors the existing /code-review high escalation pattern
# in CLAUDE.md (reserved for large/architecturally risky changes).
#
# Uses the same GEMINI_API_KEY repo secret as the other GSR workflows here.
#
# GSR's entrypoint (adk/backend/src/action-entrypoint.ts) hard-requires a
# pull_request.number in the GITHUB_EVENT_PATH JSON and throws otherwise --
# a workflow_dispatch event has no such field. GitHub Actions silently
# ignores any attempt to override its default env vars (including
# GITHUB_EVENT_PATH) via a workflow's env: block -- confirmed by testing,
# not just docs: an earlier version of this workflow tried exactly that and
# the container received the real, unmodified event file instead. The
# manual-run step below works around it differently: it mutates the
# *contents* of the file GITHUB_EVENT_PATH already points to (writable by a
# normal run: step on the host, and already correctly volume-mounted into
# the container), injecting a synthetic pull_request field into the real
# event payload rather than trying to redirect the env var itself. If GSR's
# entrypoint changes this reading, only the manual-run path (not the
# label-triggered one) would need revisiting.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'PR number to review'
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: gsr-deep-review-${{ github.event.pull_request.number || inputs.pr-number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'deep-review'
    runs-on: ubuntu-latest
    steps:
      - name: Review labeled PR
        if: github.event_name == 'pull_request'
        uses: weitzer-org/gsr@main
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          mode: subagent
          fail-on-severity: none

      - name: Inject pull_request number into the real event payload for manual runs
        if: github.event_name == 'workflow_dispatch'
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          # tmp must be created in the SAME directory as GITHUB_EVENT_PATH so
          # mv is a same-filesystem atomic rename -- mktemp's default /tmp
          # location can be a different filesystem/mount namespace than
          # /home/runner/work/_temp/_github_workflow, and a cross-device mv
          # (copy+unlink, new inode) may not land inside whatever directory
          # subtree Docker's bind mount is actually tracking.
          tmp=$(mktemp "$(dirname "$GITHUB_EVENT_PATH")/event.json.XXXXXX")
          jq --argjson num "$PR_NUMBER" '. + {pull_request: {number: $num}}' "$GITHUB_EVENT_PATH" > "$tmp"
          mv "$tmp" "$GITHUB_EVENT_PATH"

      - name: DEBUG probe what a fresh container sees at the same mount
        if: github.event_name == 'workflow_dispatch'
        run: |
          docker run --rm -v "$(dirname "$GITHUB_EVENT_PATH"):/github/workflow" alpine cat /github/workflow/"$(basename "$GITHUB_EVENT_PATH")"

      - name: Review PR via manual dispatch
        if: github.event_name == 'workflow_dispatch'
        uses: weitzer-org/gsr@main
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          mode: subagent
          fail-on-severity: none
